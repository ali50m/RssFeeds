name: CI

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */12 * * *'   # every 12 hours

jobs:
  main-job:
    name: run commands and collect message
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.event.repository.name }}
      OWNER: ${{ github.repository_owner }}
    steps:

      - name: install tree
        run: |
          sudo apt install tree -y

      - name: Run tree
        run: |
          tree

      - name: Checkout
        uses: actions/checkout@v3
        with:
          path: ${{ env.REPO }}

      - name: Run tree
        run: |
          tree

      - name: Setup SSH
        uses: MrSquaare/ssh-setup-action@v2
        with:
          host: github.com
          private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: clone repository
        run: |
          git clone git@github.com:${{ env.OWNER }}/${{ secrets.REPO }}.git

      - name: Run tree
        run: |
          tree

      - name: build
        id: build-feed
        run: |
          cd ${{ secrets.REPO }}
          # install venv
          python3 -m venv venv
          source venv/bin/activate
          # install requirements
          python3 -m pip install -r requirements.txt
          # build
          python3 cli.py
          cat artifact/feed.xml

      - name: commit and push
        run: |
          cp ./${{ secrets.REPO }}/artifact/feed.xml ./${{ env.REPO }}/pywlwz/feed.xml
          cd ${{ env.REPO }}
          git add pywlwz/feed.xml
          git commit -m "update feed.xml at $(date)"
          git push
